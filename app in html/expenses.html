<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Log Field Expense</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#37ec13",
                        "primary-dark": "#2cc20f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#132210",
                        "surface-dark": "#1a2e16",
                        "surface-active": "#294823",
                        "action-red": "#EF4444",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar hide for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display antialiased selection:bg-primary selection:text-background-dark h-full min-h-screen flex flex-col">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm border-b border-slate-200 dark:border-slate-800/50">
        <div class="flex items-center justify-between px-4 py-3 h-14">
            <button
                class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors p-2 -ml-2 rounded-full active:bg-slate-200 dark:active:bg-surface-active">
                <span class="material-symbols-outlined !text-[28px]">close</span>
            </button>
            <h1 class="text-lg font-bold tracking-tight">New Expense</h1>
            <button
                class="text-primary font-medium text-sm px-2 py-1 rounded hover:bg-surface-active/50 transition-colors">
                Drafts
            </button>
        </div>
    </header>
    <main class="flex-1 flex flex-col w-full max-w-md mx-auto px-4 pt-6 pb-24 overflow-y-auto no-scrollbar">
        <!-- Amount Input Section -->
        <div class="flex flex-col items-center justify-center mb-10 mt-2">
            <label class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-wider mb-2"
                for="amount">Amount (USD)</label>
            <div class="relative w-full flex justify-center items-center group">
                <span class="text-4xl font-bold text-slate-400 dark:text-slate-500 mr-1 mt-1">$</span>
                <input autofocus=""
                    class="bg-transparent border-none text-center text-6xl font-black text-slate-900 dark:text-white placeholder:text-slate-300 dark:placeholder:text-slate-600 focus:ring-0 w-full p-0 caret-primary"
                    id="amount" placeholder="0.00" type="number" />
            </div>
        </div>
        <!-- Category Section -->
        <div class="mb-8">
            <label
                class="block text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest mb-4 ml-1">Category</label>
            <div class="grid grid-cols-2 gap-3">
                <!-- Selected State -->
                <button
                    class="relative group flex items-center p-4 rounded-2xl bg-primary shadow-lg shadow-primary/20 ring-2 ring-primary transition-all duration-200">
                    <div class="bg-black/10 rounded-full p-2 mr-3">
                        <span class="material-symbols-outlined text-background-dark">local_gas_station</span>
                    </div>
                    <div class="flex flex-col items-start">
                        <span class="text-background-dark font-bold text-lg leading-tight">Fuel</span>
                        <span class="text-background-dark/70 text-xs font-medium">Vehicles &amp; Machinery</span>
                    </div>
                    <div class="absolute top-3 right-3">
                        <span class="material-symbols-outlined text-background-dark text-xl filled">check_circle</span>
                    </div>
                </button>
                <!-- Unselected States -->
                <button
                    class="flex items-center p-4 rounded-2xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-surface-active transition-all duration-200">
                    <div class="bg-slate-100 dark:bg-white/10 rounded-full p-2 mr-3 text-slate-500 dark:text-slate-300">
                        <span class="material-symbols-outlined">build</span>
                    </div>
                    <span class="text-slate-700 dark:text-slate-200 font-semibold text-lg">Repairs</span>
                </button>
                <button
                    class="flex items-center p-4 rounded-2xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-surface-active transition-all duration-200">
                    <div class="bg-slate-100 dark:bg-white/10 rounded-full p-2 mr-3 text-slate-500 dark:text-slate-300">
                        <span class="material-symbols-outlined">payments</span>
                    </div>
                    <span class="text-slate-700 dark:text-slate-200 font-semibold text-lg">Wages</span>
                </button>
                <button
                    class="flex items-center p-4 rounded-2xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-surface-active transition-all duration-200">
                    <div class="bg-slate-100 dark:bg-white/10 rounded-full p-2 mr-3 text-slate-500 dark:text-slate-300">
                        <span class="material-symbols-outlined">science</span>
                    </div>
                    <span class="text-slate-700 dark:text-slate-200 font-semibold text-lg">Chemicals</span>
                </button>
            </div>
        </div>
        <!-- Date Picker Section -->
        <div class="mb-8">
            <label
                class="block text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest mb-3 ml-1">Date</label>
            <button
                class="w-full flex items-center justify-between bg-white dark:bg-surface-dark p-4 rounded-xl border border-slate-200 dark:border-white/5 hover:border-primary/50 dark:hover:border-primary/50 transition-colors group">
                <div class="flex items-center gap-3">
                    <div
                        class="bg-primary/10 text-primary rounded-lg p-2 group-hover:bg-primary group-hover:text-background-dark transition-colors">
                        <span class="material-symbols-outlined">calendar_today</span>
                    </div>
                    <div class="text-left">
                        <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Expense Date</p>
                        <p class="text-lg font-bold text-slate-900 dark:text-white">Today, Oct 24</p>
                    </div>
                </div>
                <span class="material-symbols-outlined text-slate-400">chevron_right</span>
            </button>
            <!-- Inline Calendar (Simplified from component) -->
            <div class="mt-4 bg-surface-dark rounded-xl p-4 hidden">
                <!-- Hidden by default, showing expanded state concept -->
                <div class="flex items-center justify-between mb-4">
                    <button class="p-1 hover:bg-white/10 rounded-full"><span
                            class="material-symbols-outlined text-white text-sm">chevron_left</span></button>
                    <span class="text-white font-bold text-sm">October 2023</span>
                    <button class="p-1 hover:bg-white/10 rounded-full"><span
                            class="material-symbols-outlined text-white text-sm">chevron_right</span></button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center mb-2">
                    <span class="text-xs text-slate-500 font-bold">S</span>
                    <span class="text-xs text-slate-500 font-bold">M</span>
                    <span class="text-xs text-slate-500 font-bold">T</span>
                    <span class="text-xs text-slate-500 font-bold">W</span>
                    <span class="text-xs text-slate-500 font-bold">T</span>
                    <span class="text-xs text-slate-500 font-bold">F</span>
                    <span class="text-xs text-slate-500 font-bold">S</span>
                </div>
                <div class="grid grid-cols-7 gap-1">
                    <!-- Example days -->
                    <button
                        class="h-8 w-8 rounded-full flex items-center justify-center text-sm text-slate-400 hover:bg-white/5">28</button>
                    <button
                        class="h-8 w-8 rounded-full flex items-center justify-center text-sm text-slate-400 hover:bg-white/5">29</button>
                    <button
                        class="h-8 w-8 rounded-full flex items-center justify-center text-sm text-slate-400 hover:bg-white/5">30</button>
                    <button
                        class="h-8 w-8 rounded-full flex items-center justify-center text-sm text-white bg-primary font-bold text-background-dark">1</button>
                    <button
                        class="h-8 w-8 rounded-full flex items-center justify-center text-sm text-white hover:bg-white/5">2</button>
                </div>
            </div>
        </div>
        <!-- Payment Method Toggle -->
        <div class="mb-4">
            <label
                class="block text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest mb-3 ml-1">Payment
                Method</label>
            <div class="flex p-1 bg-slate-200 dark:bg-surface-dark rounded-xl">
                <label class="flex-1 cursor-pointer">
                    <input checked="" class="peer sr-only" name="payment_method" type="radio" value="cash" />
                    <div
                        class="flex items-center justify-center py-3 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 transition-all peer-checked:bg-white dark:peer-checked:bg-primary peer-checked:text-slate-900 dark:peer-checked:text-background-dark peer-checked:shadow-sm">
                        <span class="material-symbols-outlined mr-2 text-[20px]">payments</span>
                        Cash
                    </div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input class="peer sr-only" name="payment_method" type="radio" value="bank" />
                    <div
                        class="flex items-center justify-center py-3 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 transition-all peer-checked:bg-white dark:peer-checked:bg-primary peer-checked:text-slate-900 dark:peer-checked:text-background-dark peer-checked:shadow-sm">
                        <span class="material-symbols-outlined mr-2 text-[20px]">account_balance</span>
                        Bank Transfer
                    </div>
                </label>
            </div>
        </div>
    </main>
    <!-- Sticky Footer Action -->
    <div
        class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent pt-8 pb-6">
        <div class="max-w-md mx-auto w-full">
            <button
                class="w-full bg-action-red hover:bg-red-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-red-900/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">save</span>
                Log Expense
            </button>
        </div>
    </div>
</body>

</html>
