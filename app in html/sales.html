<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Record Rubber Sale</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#37ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#132210",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary selection:text-black">
    <!-- Top App Bar -->
    <header
        class="fixed top-0 left-0 right-0 z-50 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-200 dark:border-white/10">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <button
                class="p-2 -ml-2 rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition-colors text-slate-600 dark:text-slate-300">
                <span class="material-symbols-outlined text-2xl">arrow_back</span>
            </button>
            <h1 class="text-lg font-bold tracking-tight text-center flex-1">Record Rubber Sale</h1>
            <button
                class="p-2 -mr-2 rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition-colors text-slate-600 dark:text-slate-300">
                <span class="material-symbols-outlined text-2xl">more_vert</span>
            </button>
        </div>
    </header>
    <!-- Main Content -->
    <main class="flex-1 w-full max-w-md mx-auto pt-20 pb-32 px-4 flex flex-col gap-6">
        <!-- Info Notice -->
        <div class="bg-primary/10 border border-primary/20 rounded-lg p-3 flex items-start gap-3">
            <span class="material-symbols-outlined text-primary shrink-0 mt-0.5" style="font-size: 20px;">info</span>
            <p class="text-sm text-slate-600 dark:text-slate-300">
                Please verify the Metrolac reading before confirming. Values are auto-saved locally.
            </p>
        </div>
        <!-- Input Fields Stack -->
        <div class="space-y-5">
            <!-- Field 1 -->
            <div class="relative group">
                <label
                    class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider"
                    for="total-latex">Total Latex (Liters)</label>
                <div class="relative">
                    <input
                        class="block w-full h-16 rounded-xl bg-white dark:bg-white/5 border-0 ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary text-2xl font-bold placeholder:text-slate-300 dark:placeholder:text-white/20 px-4 transition-all shadow-sm group-hover:ring-primary/50"
                        id="total-latex" inputmode="decimal" placeholder="0.00" type="number" />
                    <span
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 font-medium">L</span>
                </div>
            </div>
            <!-- Field 2 -->
            <div class="relative group">
                <label
                    class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider"
                    for="total-mass">Total Mass (kg)</label>
                <div class="relative">
                    <input
                        class="block w-full h-16 rounded-xl bg-white dark:bg-white/5 border-0 ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary text-2xl font-bold placeholder:text-slate-300 dark:placeholder:text-white/20 px-4 transition-all shadow-sm group-hover:ring-primary/50"
                        id="total-mass" inputmode="decimal" placeholder="0.00" type="number" />
                    <span
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 font-medium">kg</span>
                </div>
            </div>
            <!-- Field 3 -->
            <div class="relative group">
                <label
                    class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider"
                    for="metrolac">Final Metrolac Reading</label>
                <div class="relative">
                    <input
                        class="block w-full h-16 rounded-xl bg-white dark:bg-white/5 border-0 ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary text-2xl font-bold placeholder:text-slate-300 dark:placeholder:text-white/20 px-4 transition-all shadow-sm group-hover:ring-primary/50"
                        id="metrolac" inputmode="decimal" placeholder="0.0" type="number" />
                    <span
                        class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500">science</span>
                </div>
            </div>
            <!-- Field 4 -->
            <div class="relative group">
                <label
                    class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider"
                    for="unit-price">Unit Price (LKR)</label>
                <div class="relative">
                    <span
                        class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 font-medium text-lg">Rs.</span>
                    <input
                        class="block w-full h-16 rounded-xl bg-white dark:bg-white/5 border-0 ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary text-2xl font-bold placeholder:text-slate-300 dark:placeholder:text-white/20 pl-12 pr-4 transition-all shadow-sm group-hover:ring-primary/50"
                        id="unit-price" inputmode="decimal" placeholder="0.00" type="number" />
                </div>
            </div>
        </div>
        <!-- Result Card -->
        <div
            class="mt-4 bg-gradient-to-br from-slate-800 to-slate-900 dark:from-white/5 dark:to-white/10 rounded-2xl p-6 border border-slate-700 dark:border-white/10 shadow-lg relative overflow-hidden">
            <!-- Decorative background element -->
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-primary/20 rounded-full blur-2xl"></div>
            <div class="relative z-10 flex flex-col items-center justify-center text-center">
                <span
                    class="text-sm font-medium text-slate-400 dark:text-slate-400 uppercase tracking-widest mb-2">Estimated
                    Total Value</span>
                <div class="flex items-baseline gap-1 text-primary">
                    <span class="text-2xl font-semibold opacity-80">LKR</span>
                    <span class="text-5xl font-bold tracking-tight">12,450.00</span>
                </div>
                <div
                    class="mt-4 flex items-center gap-2 text-xs text-slate-500 dark:text-slate-500 bg-black/20 px-3 py-1 rounded-full">
                    <span class="material-symbols-outlined text-sm">calculate</span>
                    <span>Auto-calculated based on mass &amp; price</span>
                </div>
            </div>
        </div>
    </main>
    <!-- Bottom Action Bar -->
    <div
        class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-white/5 z-40">
        <div class="max-w-md mx-auto">
            <button
                class="w-full h-16 bg-primary hover:bg-primary/90 active:scale-[0.98] text-background-dark font-extrabold text-lg uppercase tracking-wide rounded-xl shadow-[0_0_20px_rgba(55,236,19,0.3)] transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined font-bold">check_circle</span>
                Confirm Sale Record
            </button>
        </div>
    </div>
</body>

</html>
