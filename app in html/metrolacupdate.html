<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Update Metrolac Quality</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#37ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#132210",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar hide for cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Remove arrows from number input */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="font-display antialiased bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col selection:bg-primary selection:text-background-dark">
    <!-- Header -->
    <header
        class="flex items-center justify-between px-4 py-4 pt-12 sticky top-0 z-50 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <button
            class="flex items-center justify-center w-10 h-10 rounded-full active:bg-slate-200 dark:active:bg-slate-800 transition-colors">
            <span class="material-symbols-outlined text-slate-900 dark:text-white"
                style="font-size: 24px;">arrow_back</span>
        </button>
        <h1 class="text-lg font-bold tracking-tight text-center flex-1 pr-10">Update Quality</h1>
    </header>
    <!-- Main Content -->
    <main class="flex-1 flex flex-col px-6 py-6 gap-8">
        <!-- Context Selection -->
        <section class="flex flex-col gap-3">
            <label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                for="load-select">Select Load</label>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none z-10">
                    <span class="material-symbols-outlined text-primary" style="font-size: 24px;">local_shipping</span>
                </div>
                <select
                    class="block w-full pl-12 pr-10 py-4 text-base bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-white appearance-none cursor-pointer transition-all shadow-sm"
                    id="load-select">
                    <option disabled="" selected="" value="">Choose open load ID...</option>
                    <option value="4092">#4092 - Sector A (Rubber)</option>
                    <option value="4095">#4095 - Sector B (Latex)</option>
                    <option value="4102">#4102 - Sector C (Scrap)</option>
                </select>
                <div
                    class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-500 dark:text-slate-400">
                    <span class="material-symbols-outlined" style="font-size: 24px;">expand_more</span>
                </div>
            </div>
            <p class="text-xs text-slate-500 dark:text-slate-500 px-1">Current batch from morning collection.</p>
        </section>
        <!-- Main Input Area -->
        <section class="flex flex-col flex-1 justify-center gap-6 py-4">
            <div class="text-center space-y-2">
                <label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                    for="metrolac-reading">Metrolac Reading</label>
                <div class="relative max-w-xs mx-auto">
                    <input
                        class="block w-full text-center bg-transparent border-0 border-b-2 border-slate-600 dark:border-slate-700 focus:border-primary focus:ring-0 text-7xl font-bold tracking-tighter placeholder-slate-700 dark:placeholder-slate-800 text-slate-900 dark:text-white py-4 transition-colors"
                        id="metrolac-reading" inputmode="decimal" placeholder="0.0" step="0.1" type="number" />
                    <span
                        class="absolute right-0 bottom-6 text-xl font-medium text-slate-400 dark:text-slate-600 pointer-events-none select-none">deg</span>
                </div>
            </div>
            <!-- Status/Validation Feedback -->
            <div
                class="flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800/50 py-2 px-4 rounded-full mx-auto w-fit">
                <span class="material-symbols-outlined text-sm" style="font-size: 18px;">info</span>
                <span class="text-xs font-medium">Valid Range: 0.0 - 45.0</span>
            </div>
        </section>
        <!-- Action Button -->
        <section class="mt-auto pt-6 pb-2">
            <button
                class="w-full bg-primary hover:bg-primary/90 text-slate-900 font-bold text-lg py-5 px-6 rounded-xl shadow-[0_0_20px_rgba(55,236,19,0.3)] hover:shadow-[0_0_30px_rgba(55,236,19,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-3 uppercase tracking-wide">
                <span class="material-symbols-outlined" style="font-size: 24px;">save</span>
                Save Reading
            </button>
        </section>
    </main>
    <!-- Navigation Bar -->
    <nav class="border-t border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark pb-safe">
        <div class="flex justify-around items-end pt-2 pb-4 px-2">
            <a class="flex flex-col items-center justify-center gap-1 group flex-1 p-2" href="#">
                <span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors"
                    style="font-size: 24px;">home</span>
                <span
                    class="text-[10px] font-medium text-slate-400 group-hover:text-primary transition-colors">Home</span>
            </a>
            <a class="flex flex-col items-center justify-center gap-1 group flex-1 p-2" href="#">
                <span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors"
                    style="font-size: 24px;">local_shipping</span>
                <span
                    class="text-[10px] font-medium text-slate-400 group-hover:text-primary transition-colors">Collection</span>
            </a>
            <!-- Active State -->
            <a class="flex flex-col items-center justify-center gap-1 group flex-1 p-2 relative" href="#">
                <div
                    class="absolute -top-8 bg-primary text-background-dark rounded-full p-3 shadow-lg border-4 border-background-light dark:border-background-dark transform transition-transform group-active:scale-95">
                    <span class="material-symbols-outlined" style="font-size: 28px;">verified</span>
                </div>
                <span class="text-[10px] font-bold text-primary mt-6">Quality</span>
            </a>
            <a class="flex flex-col items-center justify-center gap-1 group flex-1 p-2" href="#">
                <span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors"
                    style="font-size: 24px;">settings</span>
                <span
                    class="text-[10px] font-medium text-slate-400 group-hover:text-primary transition-colors">Settings</span>
            </a>
        </div>
    </nav>
    <!-- Safe area spacing for iOS home indicator -->
    <div class="h-6 w-full bg-background-light dark:bg-background-dark"></div>
</body>

</html>
