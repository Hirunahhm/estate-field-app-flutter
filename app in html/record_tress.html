<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Record Trees Tapped</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#37ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#132210",
                        "surface-dark": "#1e3319",
                        "surface-dark-active": "#2a4523",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar hide for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Tap highlight color removal for mobile feel */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Active state animation for buttons */
        .btn-press:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display h-screen w-full overflow-hidden flex flex-col antialiased selection:bg-primary selection:text-black">
    <!-- Top App Bar -->
    <header class="flex-none pt-safe-top">
        <div class="flex items-center justify-between p-4 pb-2">
            <button
                class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/10 dark:hover:bg-white/10 transition-colors btn-press">
                <span class="material-symbols-outlined text-[28px]">arrow_back</span>
            </button>
            <div class="flex flex-col items-center">
                <h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">John Doe
                </h2>
                <p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">ID: 882</p>
            </div>
            <div class="flex size-12 items-center justify-end">
                <button
                    class="text-slate-900 dark:text-white flex items-center justify-center rounded-full hover:bg-black/10 dark:hover:bg-white/10 transition-colors btn-press p-2">
                    <span class="material-symbols-outlined text-[24px]">history</span>
                </button>
            </div>
        </div>
    </header>
    <!-- Main Content Area: Display & Keypad -->
    <main class="flex-1 flex flex-col justify-end pb-safe-bottom w-full max-w-md mx-auto">
        <!-- Data Display Area -->
        <div class="flex-1 flex flex-col items-center justify-center min-h-[180px] px-6">
            <h3 class="text-slate-500 dark:text-[#9bc992] tracking-widest text-sm font-bold uppercase mb-2">Trees Tapped
            </h3>
            <div class="relative w-full text-center">
                <h1
                    class="text-slate-900 dark:text-white text-[80px] leading-none font-black tracking-tighter tabular-nums select-none">
                    450
                </h1>
                <!-- Blinking cursor indicator (cosmetic) -->
                <div
                    class="absolute top-1/2 right-[10%] -translate-y-1/2 h-16 w-1 bg-primary animate-pulse rounded-full hidden sm:block">
                </div>
            </div>
            <div class="h-6 mt-2">
                <!-- Optional hint or validation message space -->
                <p class="text-xs text-slate-400 dark:text-slate-500 font-medium">Last entry: 432 trees (Yesterday)</p>
            </div>
        </div>
        <!-- Keypad Area -->
        <div class="w-full px-4 pb-4">
            <div class="grid grid-cols-3 gap-3 mb-6">
                <!-- Row 1 -->
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">1</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">2</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">3</span>
                </button>
                <!-- Row 2 -->
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">4</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">5</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">6</span>
                </button>
                <!-- Row 3 -->
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">7</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">8</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">9</span>
                </button>
                <!-- Row 4 -->
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-slate-100 dark:bg-surface-dark/50 border border-transparent dark:border-[#3b6732]/10 active:bg-slate-200 dark:active:bg-surface-dark-active transition-colors group">
                    <span
                        class="text-lg font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Clear</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-[#3b6732]/30 shadow-sm active:bg-slate-100 dark:active:bg-surface-dark-active transition-colors group">
                    <span class="text-3xl font-bold text-slate-900 dark:text-white group-active:text-primary">0</span>
                </button>
                <button
                    class="btn-press flex h-[72px] items-center justify-center rounded-xl bg-slate-100 dark:bg-surface-dark/50 border border-transparent dark:border-[#3b6732]/10 active:bg-slate-200 dark:active:bg-red-900/30 transition-colors group">
                    <span class="material-symbols-outlined text-slate-700 dark:text-slate-300 group-active:text-red-400"
                        style="font-size: 28px;">backspace</span>
                </button>
            </div>
            <!-- Confirm Action -->
            <button
                class="btn-press w-full h-16 rounded-xl bg-primary text-black flex items-center justify-center shadow-[0_0_20px_rgba(55,236,19,0.2)] hover:shadow-[0_0_25px_rgba(55,236,19,0.3)] hover:brightness-105 transition-all">
                <span class="text-lg font-black tracking-wide uppercase">Confirm Attendance</span>
                <span class="material-symbols-outlined ml-2 font-bold">check_circle</span>
            </button>
        </div>
    </main>
</body>

</html>
